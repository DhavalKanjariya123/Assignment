<!-- Different of cell padding and cell spacing.

   Cell padding: 
   It is define the space present between cell border and the content present in it.
   It deals with single cell.
   Default value of Cell padding is 1
   It is very effective as compared to cell spacing
   It is an attribute.
   <table cellpadding="value" >.....</table>

   Cell spacing:
   It is define the space present between individual cells.
   It deals with multiple cell at a time.
   Default value of Cell spacing is 2
   It is comparatively less effective.
   It is also an attribute.
   <table cellspacing="value" >.....</table>
   -->
